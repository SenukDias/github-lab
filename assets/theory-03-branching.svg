<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
  <defs>
    <symbol id="git-logo" viewBox="0 0 24 24"><path fill="#F05032" d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.7.7.7 1.832 0 2.532-.7.699-1.831.7-2.531 0-.539-.541-.674-1.337-.404-2.014L12.86 8.772v6.111c.148.087.293.191.425.323.7.7.7 1.832 0 2.532-.7.7-1.832.7-2.531 0-.7-.699-.7-1.831 0-2.531.134-.135.291-.239.45-.325V8.765c-.191-.088-.37-.204-.521-.355-.549-.548-.68-1.357-.39-2.038L7.086 3.622 1.456 9.254c-.604.603-.604 1.582 0 2.187l10.478 10.478c.604.604 1.583.604 2.188 0l9.416-9.416c.603-.604.603-1.582-.001-2.187"/></symbol>
  </defs>
  <rect width="860" height="320" fill="#0d1117" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <use href="#git-logo" x="18" y="10" width="28" height="28"/>
  <text x="56" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 03 — Git Branching</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- main branch line -->
  <line x1="55" y1="130" x2="820" y2="130" stroke="#3fb950" stroke-width="2.5"/>
  <text x="28" y="134" font-family="monospace" font-size="11" font-weight="700" fill="#3fb950">main</text>

  <!-- Commits on main -->
  <circle cx="100" cy="130" r="10" fill="#3fb950"/>
  <text x="100" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">a1b2</text>
  <text x="100" y="168" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">init</text>

  <circle cx="200" cy="130" r="10" fill="#3fb950"/>
  <text x="200" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">c3d4</text>
  <text x="200" y="168" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">feat: base</text>

  <!-- Branch out from c3d4 -->
  <path d="M200 130 Q200 90 260 90" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <text x="210" y="84" font-family="monospace" font-size="11" font-weight="700" fill="#58a6ff">feature/login</text>

  <!-- Feature branch commits -->
  <line x1="260" y1="90" x2="540" y2="90" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="300" cy="90" r="9" fill="#58a6ff"/>
  <text x="300" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">e5f6</text>
  <text x="300" y="65" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">add form</text>
  <circle cx="420" cy="90" r="9" fill="#58a6ff"/>
  <text x="420" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">g7h8</text>
  <text x="420" y="65" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">add auth</text>
  <circle cx="540" cy="90" r="9" fill="#58a6ff"/>
  <text x="540" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">i9j0</text>
  <text x="540" y="65" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">tests pass</text>

  <!-- hotfix branch from main -->
  <path d="M300 130 Q300 175 360 175" stroke="#f85149" stroke-width="2" fill="none"/>
  <text x="280" y="194" font-family="monospace" font-size="11" font-weight="700" fill="#f85149">hotfix/bug-42</text>
  <line x1="360" y1="175" x2="460" y2="175" stroke="#f85149" stroke-width="2"/>
  <circle cx="400" cy="175" r="9" fill="#f85149"/>
  <text x="400" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">k1l2</text>
  <text x="400" y="205" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">fix: null ptr</text>

  <!-- hotfix merge back to main -->
  <path d="M460 175 Q460 130 500 130" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <circle cx="500" cy="130" r="10" fill="#d29922"/>
  <text x="500" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">m3n4</text>
  <text x="500" y="168" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#d29922">merge hotfix</text>

  <!-- feature merge to main (PR merge) -->
  <path d="M540 90 Q600 90 640 130" stroke="#58a6ff" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <circle cx="640" cy="130" r="10" fill="#a371f7"/>
  <text x="640" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">o5p6</text>
  <text x="640" y="168" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#a371f7">merge PR #7</text>

  <!-- HEAD pointer -->
  <circle cx="760" cy="130" r="10" fill="#3fb950"/>
  <text x="760" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">q7r8</text>
  <rect x="720" y="100" width="80" height="22" rx="4" fill="#1a3a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="760" y="115" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#3fb950">HEAD</text>

  <!-- Key commands -->
  <rect x="28" y="238" width="804" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="258" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#e6edf3">Branch commands:</text>
  <text x="44" y="278" font-family="monospace" font-size="11" fill="#F05032">git branch feature</text>
  <text x="192" y="278" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="205" y="278" font-family="monospace" font-size="11" fill="#F05032">git switch feature</text>
  <text x="360" y="278" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="373" y="278" font-family="monospace" font-size="11" fill="#58a6ff">git merge feature</text>
  <text x="528" y="278" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="541" y="278" font-family="monospace" font-size="11" fill="#a371f7">git rebase main</text>
  <text x="686" y="278" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="699" y="278" font-family="monospace" font-size="11" fill="#f85149">git branch -d</text>
  <text x="430" y="308" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Branches are cheap pointer moves — create freely, merge often</text>
</svg>
