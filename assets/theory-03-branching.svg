<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/><stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <clipPath id="card"><rect width="860" height="440" rx="14"/></clipPath>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3fb950" opacity="0.9"/>
    </marker>
    <marker id="ahP" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#a78bfa" opacity="0.9"/>
    </marker>
  </defs>
  <g clip-path="url(#card)">
    <rect width="860" height="440" fill="url(#bg)"/>
    <!-- header -->
    <rect width="860" height="56" fill="url(#hdr)"/>
    <circle cx="24" cy="28" r="5.5" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="40" cy="28" r="5.5" fill="#ffd93d" opacity="0.9"/>
    <circle cx="56" cy="28" r="5.5" fill="#6bcb77" opacity="0.9"/>
    <text x="430" y="34" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#e6edf3">📖  Theory 03 — Git Branching</text>
    <line x1="0" y1="56" x2="860" y2="56" stroke="#30363d" stroke-width="1"/>

    <!-- Subtitle -->
    <text x="430" y="88" font-family="system-ui,sans-serif" font-size="12.5" text-anchor="middle" fill="#8b949e">Branches let multiple people work on different features simultaneously without interfering</text>

    <!-- ── Main branch line ── -->
    <line x1="50" y1="150" x2="810" y2="150" stroke="#3fb950" stroke-width="2.5" opacity="0.6"/>

    <!-- Main branch commits -->
    <!-- C1 -->
    <circle cx="100" cy="150" r="11" fill="#0d1117" stroke="#3fb950" stroke-width="2.5"/>
    <text x="100" y="155" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#3fb950">C1</text>
    <text x="100" y="175" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">init</text>

    <!-- C2 -->
    <circle cx="220" cy="150" r="11" fill="#0d1117" stroke="#3fb950" stroke-width="2.5"/>
    <text x="220" y="155" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#3fb950">C2</text>
    <text x="220" y="175" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">feat</text>

    <!-- C6 (after merge) -->
    <circle cx="610" cy="150" r="11" fill="#0d1117" stroke="#3fb950" stroke-width="2.5"/>
    <text x="610" y="155" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#3fb950">C6</text>
    <text x="610" y="175" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">fix</text>

    <!-- Merge commit C7 -->
    <circle cx="740" cy="150" r="13" fill="#21262d" stroke="#3fb950" stroke-width="2.5"/>
    <text x="740" y="155" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#3fb950">C7</text>
    <text x="740" y="175" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#3fb950">merge</text>

    <!-- ── Feature branch ── -->
    <!-- Branch curve from C2 -->
    <path d="M220,150 Q220,255 310,255" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.7"/>
    <line x1="310" y1="255" x2="620" y2="255" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
    <!-- Merge curve back to C7 -->
    <path d="M620,255 Q740,255 740,162" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ahP)"/>

    <!-- Feature commits -->
    <!-- C3 -->
    <circle cx="350" cy="255" r="11" fill="#0d1117" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="350" y="260" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#a78bfa">C3</text>
    <text x="350" y="280" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">login</text>

    <!-- C4 -->
    <circle cx="470" cy="255" r="11" fill="#0d1117" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="470" y="260" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#a78bfa">C4</text>
    <text x="470" y="280" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">jwt</text>

    <!-- C5 -->
    <circle cx="590" cy="255" r="11" fill="#a78bfa"/>
    <text x="590" y="260" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#fff">C5</text>
    <text x="590" y="280" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6e7681">tests</text>

    <!-- Branch labels -->
    <rect x="36" y="130" width="42" height="18" rx="9" fill="#238636" opacity="0.9"/>
    <text x="57" y="143" font-family="system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#fff">main</text>

    <rect x="268" y="236" width="88" height="18" rx="9" fill="#7c3aed" opacity="0.9"/>
    <text x="312" y="249" font-family="system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#fff">feature/login</text>

    <!-- HEAD pointer -->
    <line x1="740" y1="124" x2="740" y2="136" stroke="#f78166" stroke-width="1.5"/>
    <rect x="710" y="108" width="60" height="18" rx="4" fill="#f78166" opacity="0.9"/>
    <text x="740" y="121" font-family="'Courier New',monospace" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">HEAD</text>

    <!-- ── Branch commands ───────────────────────── -->
    <rect x="30" y="308" width="390" height="106" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="50" y="330" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Creating &amp; switching branches</text>
    <text x="50" y="352" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="66" y="352" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git switch -c feature/login</text>
    <text x="50" y="370" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="66" y="370" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git switch main</text>
    <text x="50" y="388" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="66" y="388" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git branch -v</text>
    <text x="50" y="406" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="66" y="406" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git branch -d feature/login</text>

    <rect x="440" y="308" width="390" height="106" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="460" y="330" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Merging &amp; visualizing</text>
    <text x="460" y="352" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="476" y="352" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git merge feature/login</text>
    <text x="460" y="370" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="476" y="370" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git merge --no-ff feature/login</text>
    <text x="460" y="388" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="476" y="388" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git log --oneline --graph --all</text>
    <text x="460" y="406" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="476" y="406" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git rebase main</text>
  </g>
  <rect width="860" height="440" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
