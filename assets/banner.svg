<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gBeginner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="gInter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a6700"/>
      <stop offset="100%" stop-color="#bb8009"/>
    </linearGradient>
    <linearGradient id="gPro" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#30363d" opacity="0.6"/>
    </pattern>
    <clipPath id="card"><rect width="900" height="260" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background -->
    <rect width="900" height="260" fill="url(#bg)"/>
    <!-- Dot pattern -->
    <rect width="900" height="260" fill="url(#dots)"/>

    <!-- ── LEFT: Git branch visualization ─────────────────── -->
    <!-- Main branch line -->
    <line x1="60" y1="30" x2="60" y2="230" stroke="#238636" stroke-width="2.5" opacity="0.7"/>
    <!-- Main commits -->
    <circle cx="60" cy="50"  r="7" fill="#0d1117" stroke="#238636" stroke-width="2.5"/>
    <circle cx="60" cy="100" r="7" fill="#0d1117" stroke="#238636" stroke-width="2.5"/>
    <circle cx="60" cy="155" r="7" fill="#238636"/>
    <circle cx="60" cy="210" r="7" fill="#0d1117" stroke="#238636" stroke-width="2.5"/>
    <!-- Labels beside commits -->
    <text x="76" y="54"  font-family="'Courier New',monospace" font-size="9" fill="#3fb950" opacity="0.8">main</text>
    <text x="76" y="104" font-family="'Courier New',monospace" font-size="9" fill="#3fb950" opacity="0.8">feat-a</text>
    <text x="76" y="159" font-family="'Courier New',monospace" font-size="9" fill="#fff"    opacity="0.9">HEAD</text>
    <text x="76" y="214" font-family="'Courier New',monospace" font-size="9" fill="#3fb950" opacity="0.8">merge</text>
    <!-- Feature branch -->
    <path d="M60,100 Q100,100 100,125 L100,168" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M100,168 Q100,195 60,195" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.7"/>
    <circle cx="100" cy="138" r="6" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="100" cy="168" r="6" fill="#a78bfa"/>
    <text x="112" y="142" font-family="'Courier New',monospace" font-size="9" fill="#c4b5fd" opacity="0.8">feature</text>
    <!-- Branch label tag -->
    <rect x="28" y="145" width="48" height="18" rx="9" fill="#238636" opacity="0.15"/>
    <text x="52" y="158" font-family="system-ui,sans-serif" font-size="8" font-weight="600" text-anchor="middle" fill="#3fb950">current</text>

    <!-- ── CENTER: Title Block ─────────────────────────────── -->
    <text x="472" y="92"  font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="44" font-weight="900" text-anchor="middle" fill="url(#title)" letter-spacing="-1">GitHub &amp; Docker</text>
    <text x="472" y="136" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="#8b949e" letter-spacing="3">TECHNICAL  LAB  SESSION</text>

    <!-- Divider line with glow -->
    <line x1="200" y1="155" x2="744" y2="155" stroke="url(#lineGlow)" stroke-width="1.5"/>

    <!-- Level pills -->
    <rect x="210" y="168" width="130" height="30" rx="15" fill="url(#gBeginner)" opacity="0.9"/>
    <text x="275" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">🟢 Beginner</text>

    <text x="350" y="188" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle" fill="#58a6ff">→</text>

    <rect x="363" y="168" width="166" height="30" rx="15" fill="url(#gInter)" opacity="0.9"/>
    <text x="446" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">🟡 Intermediate</text>

    <text x="538" y="188" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle" fill="#58a6ff">→</text>

    <rect x="550" y="168" width="112" height="30" rx="15" fill="url(#gPro)" opacity="0.9"/>
    <text x="606" y="188" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">🔴 Pro</text>

    <!-- Stats row -->
    <text x="472" y="228" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#6e7681">16 Hands-on Labs  ·  3 Skill Levels  ·  6+ Hours of Learning  ·  Real-world Projects</text>

    <!-- ── RIGHT: Terminal mockup ──────────────────────────── -->
    <rect x="760" y="36" width="124" height="112" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Terminal header -->
    <rect x="760" y="36" width="124" height="22" rx="8" fill="#21262d"/>
    <rect x="760" y="46" width="124" height="12" fill="#21262d"/>
    <circle cx="775" cy="47" r="4" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="787" cy="47" r="4" fill="#ffd93d" opacity="0.9"/>
    <circle cx="799" cy="47" r="4" fill="#6bcb77" opacity="0.9"/>
    <!-- Terminal content -->
    <text x="771" y="74"  font-family="'Courier New',monospace" font-size="9.5" fill="#58a6ff">$ git init</text>
    <text x="771" y="88"  font-family="'Courier New',monospace" font-size="9.5" fill="#7ee787">✓ Initialized</text>
    <text x="771" y="102" font-family="'Courier New',monospace" font-size="9.5" fill="#58a6ff">$ git commit</text>
    <text x="771" y="116" font-family="'Courier New',monospace" font-size="9.5" fill="#7ee787">✓ [main] da6e5</text>
    <text x="771" y="130" font-family="'Courier New',monospace" font-size="9.5" fill="#58a6ff">$ gh pr create</text>
    <text x="771" y="138" font-family="'Courier New',monospace" font-size="9.5" fill="#e6edf3" opacity="0.4">▌</text>

    <!-- Glow behind terminal -->
    <ellipse cx="822" cy="92" rx="50" ry="35" fill="#58a6ff" opacity="0.04"/>
  </g>

  <!-- Card border -->
  <rect width="900" height="260" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <!-- Top accent line -->
  <line x1="200" y1="0" x2="700" y2="0" stroke="url(#lineGlow)" stroke-width="2"/>
</svg>
