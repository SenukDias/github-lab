<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330">
  <defs>
    <symbol id="git-logo" viewBox="0 0 24 24"><path fill="#F05032" d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.7.7.7 1.832 0 2.532-.7.699-1.831.7-2.531 0-.539-.541-.674-1.337-.404-2.014L12.86 8.772v6.111c.148.087.293.191.425.323.7.7.7 1.832 0 2.532-.7.7-1.832.7-2.531 0-.7-.699-.7-1.831 0-2.531.134-.135.291-.239.45-.325V8.765c-.191-.088-.37-.204-.521-.355-.549-.548-.68-1.357-.39-2.038L7.086 3.622 1.456 9.254c-.604.603-.604 1.582 0 2.187l10.478 10.478c.604.604 1.583.604 2.188 0l9.416-9.416c.603-.604.603-1.582-.001-2.187"/></symbol>
    <symbol id="gh-logo" viewBox="0 0 24 24"><path fill="#e6edf3" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></symbol>
  </defs>
  <rect width="860" height="330" fill="#0d1117" rx="12"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <!-- Git logo in header -->
  <use href="#git-logo" x="18" y="10" width="28" height="28"/>
  <!-- GitHub logo in header -->
  <use href="#gh-logo" x="52" y="10" width="28" height="28"/>
  <text x="96" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 01 — Git vs GitHub</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- Git column -->
  <rect x="32" y="66" width="370" height="232" rx="8" fill="#161b22" stroke="#F05032" stroke-width="1.5"/>
  <rect x="32" y="66" width="370" height="36" rx="8" fill="#F05032" fill-opacity="0.2"/>
  <!-- Small Git logo in column header -->
  <use href="#git-logo" x="40" y="73" width="22" height="22"/>
  <text x="72" y="89" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#F05032">Git — Version Control System</text>
  <text x="52" y="120" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Runs locally on your machine</text>
  <text x="52" y="140" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Tracks file changes over time</text>
  <text x="52" y="160" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Creates snapshots (commits)</text>
  <text x="52" y="180" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Enables branching and merging</text>
  <text x="52" y="200" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Works completely offline</text>
  <text x="52" y="220" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Free, open-source (GPLv2)</text>
  <text x="52" y="254" font-family="'Segoe UI',sans-serif" font-size="11" fill="#F05032">Install: git --version · Config: git config</text>
  <text x="52" y="272" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Created by Linus Torvalds · 2005</text>

  <!-- GitHub column -->
  <rect x="458" y="66" width="370" height="232" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <rect x="458" y="66" width="370" height="36" rx="8" fill="#30363d" fill-opacity="0.8"/>
  <!-- Small GitHub logo in column header -->
  <circle cx="471" cy="84" r="12" fill="#30363d"/>
  <use href="#gh-logo" x="459" y="72" width="24" height="24"/>
  <text x="494" y="89" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#e6edf3">GitHub — Cloud Hosting Platform</text>
  <text x="478" y="120" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Hosts Git repositories in the cloud</text>
  <text x="478" y="140" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Collaboration: PRs, code review</text>
  <text x="478" y="160" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• GitHub Actions: CI/CD pipelines</text>
  <text x="478" y="180" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Issues, Projects, Wikis</text>
  <text x="478" y="200" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• GitHub Pages, Codespaces, GHCR</text>
  <text x="478" y="220" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Requires internet connection</text>
  <text x="478" y="254" font-family="'Segoe UI',sans-serif" font-size="11" fill="#58a6ff">Access: github.com · gh auth login</text>
  <text x="478" y="272" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Owned by Microsoft · Founded 2008</text>

  <!-- VS arrow -->
  <text x="430" y="190" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="900" fill="#d29922">↔</text>

  <text x="430" y="316" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Git is the tool · GitHub is the platform built on top of Git</text>
</svg>
