<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/><stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="gitCol" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0502b"/><stop offset="100%" stop-color="#f78166"/>
    </linearGradient>
    <linearGradient id="ghCol" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <clipPath id="card"><rect width="860" height="460" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <!-- bg -->
    <rect width="860" height="460" fill="url(#bg)"/>
    <!-- header -->
    <rect width="860" height="56" fill="url(#hdr)"/>
    <!-- header dots -->
    <circle cx="24" cy="28" r="5.5" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="40" cy="28" r="5.5" fill="#ffd93d" opacity="0.9"/>
    <circle cx="56" cy="28" r="5.5" fill="#6bcb77" opacity="0.9"/>
    <!-- header title -->
    <text x="430" y="34" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#e6edf3">📖  Theory 01 — What is Git &amp; GitHub?</text>
    <!-- header bottom line -->
    <line x1="0" y1="56" x2="860" y2="56" stroke="#30363d" stroke-width="1"/>

    <!-- center divider -->
    <line x1="430" y1="56" x2="430" y2="400" stroke="#30363d" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>

    <!-- ══ GIT (left) ══════════════════════════════ -->
    <!-- Git hex badge -->
    <polygon points="80,82 104,68 128,82 128,110 104,124 80,110" fill="none" stroke="#f0502b" stroke-width="2.5" opacity="0.85"/>
    <text x="104" y="102" font-family="'Courier New',Consolas,monospace" font-size="16" font-weight="900" text-anchor="middle" fill="#f0502b">git</text>
    <!-- Git title -->
    <text x="160" y="86" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="url(#gitCol)">Git</text>
    <text x="160" y="107" font-family="system-ui,sans-serif" font-size="11.5" fill="#8b949e">Distributed Version Control System</text>

    <!-- Git bullets -->
    <text x="74" y="150" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="150" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Tracks every file change locally</text>

    <text x="74" y="174" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="174" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Created by Linus Torvalds, 2005</text>

    <text x="74" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="198" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Works completely offline</text>

    <text x="74" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="222" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Free &amp; open-source software</text>

    <text x="74" y="246" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="246" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Runs on your local machine</text>

    <text x="74" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#3fb950">●</text>
    <text x="92" y="270" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Command-line tool (core)</text>

    <!-- Git commands box -->
    <rect x="66" y="294" width="340" height="92" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="82" y="315" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="96" y="315" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git init</text>
    <text x="82" y="333" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="96" y="333" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git add .</text>
    <text x="82" y="351" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="96" y="351" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git commit -m "first commit"</text>
    <text x="82" y="369" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="96" y="369" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">git log --oneline</text>

    <!-- ══ GITHUB (right) ════════════════════════════ -->
    <!-- GitHub circle badge -->
    <circle cx="510" cy="96" r="28" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.85"/>
    <circle cx="510" cy="96" r="12" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <text x="510" y="101" font-family="system-ui,sans-serif" font-size="13" font-weight="900" text-anchor="middle" fill="#58a6ff">GH</text>
    <!-- GitHub title -->
    <text x="562" y="86" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="url(#ghCol)">GitHub</text>
    <text x="562" y="107" font-family="system-ui,sans-serif" font-size="11.5" fill="#8b949e">Cloud Platform for Git Repositories</text>

    <!-- GitHub bullets -->
    <text x="450" y="150" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="150" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Hosts Git repos in the cloud</text>

    <text x="450" y="174" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="174" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Pull Requests &amp; code review</text>

    <text x="450" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="198" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">CI/CD via GitHub Actions</text>

    <text x="450" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="222" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Issues &amp; project management</text>

    <text x="450" y="246" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="246" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Owned by Microsoft (since 2018)</text>

    <text x="450" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">●</text>
    <text x="468" y="270" font-family="system-ui,sans-serif" font-size="12.5" fill="#e6edf3">Web UI + REST &amp; GraphQL API</text>

    <!-- GitHub commands box -->
    <rect x="442" y="294" width="360" height="92" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="458" y="315" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="472" y="315" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">gh auth login</text>
    <text x="458" y="333" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="472" y="333" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">gh repo create my-app --public</text>
    <text x="458" y="351" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="472" y="351" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">gh pr create --title "feat: ..."</text>
    <text x="458" y="369" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="472" y="369" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3">gh issue list --label bug</text>

    <!-- Footer insight bar -->
    <rect y="400" width="860" height="60" fill="#1a1008"/>
    <line x1="0" y1="400" x2="860" y2="400" stroke="#f0502b" stroke-width="1.5" opacity="0.4"/>
    <text x="430" y="426" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#ffa657">💡  Key Insight</text>
    <text x="430" y="447" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#8b949e">Git ≠ GitHub.   Git is the version control tool that runs locally.   GitHub is a cloud service that hosts Git repos.</text>
  </g>
  <rect width="860" height="460" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
