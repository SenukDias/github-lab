<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/><stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.8"/>
    </linearGradient>
    <clipPath id="card"><rect width="860" height="420" rx="14"/></clipPath>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff" opacity="0.85"/>
    </marker>
    <marker id="ahPull" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#f78166" opacity="0.85"/>
    </marker>
  </defs>
  <g clip-path="url(#card)">
    <rect width="860" height="420" fill="url(#bg)"/>
    <!-- header -->
    <rect width="860" height="56" fill="url(#hdr)"/>
    <circle cx="24" cy="28" r="5.5" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="40" cy="28" r="5.5" fill="#ffd93d" opacity="0.9"/>
    <circle cx="56" cy="28" r="5.5" fill="#6bcb77" opacity="0.9"/>
    <text x="430" y="34" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#e6edf3">📖  Theory 02 — The Git Lifecycle</text>
    <line x1="0" y1="56" x2="860" y2="56" stroke="#30363d" stroke-width="1"/>

    <!-- Stage subtitle -->
    <text x="430" y="92" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#8b949e">Every file you work on passes through these four stages:</text>

    <!-- ── Stage boxes ───────────────────────────────── -->
    <!-- STAGE 1: Working Directory -->
    <rect x="30" y="112" width="158" height="140" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <rect x="30" y="112" width="158" height="32" rx="10" fill="#238636" opacity="0.25"/>
    <rect x="30" y="132" width="158" height="12" fill="#238636" opacity="0.25"/>
    <text x="109" y="133" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3fb950">WORKING DIRECTORY</text>
    <text x="109" y="162" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#e6edf3">📁</text>
    <text x="109" y="186" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">Your local files</text>
    <text x="109" y="204" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">where you edit code</text>
    <text x="109" y="224" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">Untracked / Modified</text>
    <text x="109" y="242" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">Deleted / Renamed</text>

    <!-- Arrow 1 → (git add) -->
    <line x1="192" y1="182" x2="242" y2="182" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity="0.85"/>
    <rect x="192" y="158" width="52" height="20" rx="4" fill="#0d1117"/>
    <text x="218" y="172" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#58a6ff">git add</text>

    <!-- STAGE 2: Staging Area -->
    <rect x="246" y="112" width="158" height="140" rx="10" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
    <rect x="246" y="112" width="158" height="32" rx="10" fill="#9a6700" opacity="0.25"/>
    <rect x="246" y="132" width="158" height="12" fill="#9a6700" opacity="0.25"/>
    <text x="325" y="133" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#d29922">STAGING AREA</text>
    <text x="325" y="162" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#e6edf3">📋</text>
    <text x="325" y="186" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">Files marked for</text>
    <text x="325" y="204" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">the next commit</text>
    <text x="325" y="224" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">Index / Cache</text>
    <text x="325" y="242" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">git status shows A</text>

    <!-- Arrow 2 → (git commit) -->
    <line x1="408" y1="182" x2="458" y2="182" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity="0.85"/>
    <rect x="404" y="158" width="64" height="20" rx="4" fill="#0d1117"/>
    <text x="436" y="172" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#58a6ff">git commit</text>

    <!-- STAGE 3: Local Repo -->
    <rect x="462" y="112" width="158" height="140" rx="10" fill="#21262d" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="462" y="112" width="158" height="32" rx="10" fill="#7c3aed" opacity="0.25"/>
    <rect x="462" y="132" width="158" height="12" fill="#7c3aed" opacity="0.25"/>
    <text x="541" y="133" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#c4b5fd">LOCAL REPOSITORY</text>
    <text x="541" y="162" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#e6edf3">🗄️</text>
    <text x="541" y="186" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">Committed history</text>
    <text x="541" y="204" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">on your machine</text>
    <text x="541" y="224" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">git log, .git folder</text>
    <text x="541" y="242" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">Branches &amp; tags</text>

    <!-- Arrow 3 → (git push) -->
    <line x1="624" y1="182" x2="672" y2="182" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity="0.85"/>
    <rect x="622" y="158" width="52" height="20" rx="4" fill="#0d1117"/>
    <text x="648" y="172" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#58a6ff">git push</text>

    <!-- STAGE 4: Remote Repo -->
    <rect x="676" y="112" width="158" height="140" rx="10" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="676" y="112" width="158" height="32" rx="10" fill="#1f4a7d" opacity="0.5"/>
    <rect x="676" y="132" width="158" height="12" fill="#1f4a7d" opacity="0.5"/>
    <text x="755" y="133" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#58a6ff">REMOTE REPO</text>
    <text x="755" y="162" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#e6edf3">☁️</text>
    <text x="755" y="186" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">GitHub / GitLab</text>
    <text x="755" y="204" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#8b949e">Shared with team</text>
    <text x="755" y="224" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">origin/main</text>
    <text x="755" y="242" font-family="'Courier New',monospace" font-size="10" text-anchor="middle" fill="#6e7681">PRs, Issues, CI/CD</text>

    <!-- ── Reverse arrows (pull/fetch) ────── -->
    <!-- git pull arrow back -->
    <path d="M676,290 L30,290" stroke="#f78166" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#ahPull)" opacity="0.7" fill="none"/>
    <rect x="300" y="274" width="116" height="22" rx="5" fill="#0d1117"/>
    <text x="358" y="289" font-family="'Courier New',monospace" font-size="11" text-anchor="middle" fill="#f78166">git pull / git fetch</text>

    <!-- Restore arrow (staging back to working) -->
    <path d="M246,310 L188,310" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ahPull)" opacity="0.6" fill="none"/>
    <rect x="185" y="296" width="62" height="20" rx="4" fill="#0d1117"/>
    <text x="216" y="310" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#a78bfa">git restore</text>

    <!-- Quick ref commands -->
    <rect x="30" y="330" width="800" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="56" y="350" font-family="'Courier New',monospace" font-size="10.5" fill="#58a6ff">git status</text>
    <text x="56" y="368" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">see all stages</text>
    <line x1="160" y1="334" x2="160" y2="382" stroke="#30363d" stroke-width="1"/>
    <text x="196" y="350" font-family="'Courier New',monospace" font-size="10.5" fill="#3fb950">git add -p</text>
    <text x="196" y="368" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">stage interactively</text>
    <line x1="306" y1="334" x2="306" y2="382" stroke="#30363d" stroke-width="1"/>
    <text x="340" y="350" font-family="'Courier New',monospace" font-size="10.5" fill="#d29922">git reset HEAD~1</text>
    <text x="340" y="368" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">undo last commit</text>
    <line x1="490" y1="334" x2="490" y2="382" stroke="#30363d" stroke-width="1"/>
    <text x="524" y="350" font-family="'Courier New',monospace" font-size="10.5" fill="#c4b5fd">git stash</text>
    <text x="524" y="368" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">temp save WIP</text>
    <line x1="640" y1="334" x2="640" y2="382" stroke="#30363d" stroke-width="1"/>
    <text x="672" y="350" font-family="'Courier New',monospace" font-size="10.5" fill="#f78166">git diff --staged</text>
    <text x="672" y="368" font-family="system-ui,sans-serif" font-size="10" fill="#6e7681">review before commit</text>
  </g>
  <rect width="860" height="420" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
