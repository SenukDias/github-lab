<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330">
  <defs>
    <symbol id="git-logo" viewBox="0 0 24 24"><path fill="#F05032" d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.7.7.7 1.832 0 2.532-.7.699-1.831.7-2.531 0-.539-.541-.674-1.337-.404-2.014L12.86 8.772v6.111c.148.087.293.191.425.323.7.7.7 1.832 0 2.532-.7.7-1.832.7-2.531 0-.7-.699-.7-1.831 0-2.531.134-.135.291-.239.45-.325V8.765c-.191-.088-.37-.204-.521-.355-.549-.548-.68-1.357-.39-2.038L7.086 3.622 1.456 9.254c-.604.603-.604 1.582 0 2.187l10.478 10.478c.604.604 1.583.604 2.188 0l9.416-9.416c.603-.604.603-1.582-.001-2.187"/></symbol>
  </defs>
  <rect width="860" height="330" fill="#0d1117" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <use href="#git-logo" x="18" y="10" width="28" height="28"/>
  <text x="56" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 02 — Git File Lifecycle</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- Stage boxes -->
  <!-- Working Directory -->
  <rect x="28" y="80" width="170" height="90" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <use href="#git-logo" x="36" y="88" width="18" height="18"/>
  <text x="62" y="102" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#8b949e">Working Directory</text>
  <text x="40" y="122" font-family="monospace" font-size="11" fill="#6e7681">Untracked files</text>
  <text x="40" y="138" font-family="monospace" font-size="11" fill="#6e7681">Modified files</text>
  <text x="40" y="154" font-family="monospace" font-size="11" fill="#6e7681">Deleted files</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="125" x2="238" y2="125" stroke="#F05032" stroke-width="2"/>
  <polygon points="238,120 248,125 238,130" fill="#F05032"/>
  <text x="220" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#F05032">git add</text>

  <!-- Staging Area -->
  <rect x="250" y="80" width="170" height="90" rx="8" fill="#161b22" stroke="#F05032" stroke-width="1.5"/>
  <use href="#git-logo" x="258" y="88" width="18" height="18"/>
  <text x="284" y="102" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#F05032">Staging Area</text>
  <text x="263" y="122" font-family="monospace" font-size="11" fill="#e6edf3">Staged changes</text>
  <text x="263" y="138" font-family="monospace" font-size="11" fill="#e6edf3">Ready to commit</text>
  <text x="263" y="154" font-family="monospace" font-size="11" fill="#8b949e">git status → green</text>

  <!-- Arrow 2 -->
  <line x1="422" y1="125" x2="460" y2="125" stroke="#F05032" stroke-width="2"/>
  <polygon points="460,120 470,125 460,130" fill="#F05032"/>
  <text x="443" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#F05032">git commit</text>

  <!-- Local Repo -->
  <rect x="472" y="80" width="170" height="90" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <use href="#git-logo" x="480" y="88" width="18" height="18"/>
  <text x="506" y="102" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#3fb950">Local Repository</text>
  <text x="485" y="122" font-family="monospace" font-size="11" fill="#e6edf3">Committed history</text>
  <text x="485" y="138" font-family="monospace" font-size="11" fill="#e6edf3">git log shows SHA</text>
  <text x="485" y="154" font-family="monospace" font-size="11" fill="#8b949e">.git/ directory</text>

  <!-- Arrow 3 -->
  <line x1="644" y1="125" x2="682" y2="125" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="682,120 692,125 682,130" fill="#58a6ff"/>
  <text x="665" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">git push</text>

  <!-- Remote Repo -->
  <rect x="694" y="80" width="138" height="90" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="763" y="102" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#58a6ff">Remote (GitHub)</text>
  <text x="706" y="122" font-family="monospace" font-size="11" fill="#e6edf3">origin/main</text>
  <text x="706" y="138" font-family="monospace" font-size="11" fill="#8b949e">github.com/user</text>
  <text x="706" y="154" font-family="monospace" font-size="11" fill="#8b949e">/repo.git</text>

  <!-- Back arrow: git pull -->
  <path d="M694 192 Q430 230 200 192" stroke="#d29922" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="200,187 190,192 200,197" fill="#d29922"/>
  <text x="430" y="228" text-anchor="middle" font-family="monospace" font-size="11" fill="#d29922">git pull / git fetch + merge</text>

  <!-- Key commands section -->
  <rect x="28" y="248" width="804" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="268" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#e6edf3">Essential commands:</text>
  <text x="44" y="288" font-family="monospace" font-size="11" fill="#F05032">git status</text>
  <text x="130" y="288" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="143" y="288" font-family="monospace" font-size="11" fill="#F05032">git add .</text>
  <text x="225" y="288" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="238" y="288" font-family="monospace" font-size="11" fill="#F05032">git commit -m "msg"</text>
  <text x="400" y="288" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="413" y="288" font-family="monospace" font-size="11" fill="#58a6ff">git push origin main</text>
  <text x="562" y="288" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="575" y="288" font-family="monospace" font-size="11" fill="#d29922">git pull</text>
  <text x="630" y="288" font-family="monospace" font-size="11" fill="#8b949e">·</text>
  <text x="643" y="288" font-family="monospace" font-size="11" fill="#3fb950">git log --oneline</text>
  <text x="430" y="316" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">git add moves changes from Working Directory → Staging · git commit moves Staging → Local Repo</text>
</svg>
