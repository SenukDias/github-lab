<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 310" width="860" height="310">
  <defs>
    <symbol id="git-logo" viewBox="0 0 24 24"><path fill="#F05032" d="M23.546 10.93L13.067.452c-.604-.603-1.582-.603-2.188 0L8.708 2.627l2.76 2.76c.645-.215 1.379-.07 1.889.441.516.515.658 1.258.438 1.9l2.658 2.66c.645-.223 1.387-.078 1.9.435.7.7.7 1.832 0 2.532-.7.699-1.831.7-2.531 0-.539-.541-.674-1.337-.404-2.014L12.86 8.772v6.111c.148.087.293.191.425.323.7.7.7 1.832 0 2.532-.7.7-1.832.7-2.531 0-.7-.699-.7-1.831 0-2.531.134-.135.291-.239.45-.325V8.765c-.191-.088-.37-.204-.521-.355-.549-.548-.68-1.357-.39-2.038L7.086 3.622 1.456 9.254c-.604.603-.604 1.582 0 2.187l10.478 10.478c.604.604 1.583.604 2.188 0l9.416-9.416c.603-.604.603-1.582-.001-2.187"/></symbol>
    <symbol id="gh-logo" viewBox="0 0 24 24"><path fill="#e6edf3" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></symbol>
  </defs>
  <rect width="860" height="310" fill="#0d1117" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <use href="#git-logo" x="18" y="10" width="28" height="28"/>
  <use href="#gh-logo" x="50" y="10" width="28" height="28"/>
  <text x="88" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 04 — GitHub Flow</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- 6 step boxes -->
  <!-- Step 1 -->
  <rect x="18" y="68" width="126" height="130" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="18" y="68" width="126" height="32" rx="8" fill="#238636" fill-opacity="0.3"/>
  <text x="81" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3fb950">1. Branch</text>
  <use href="#git-logo" x="24" y="70" width="20" height="20"/>
  <text x="28" y="116" font-family="monospace" font-size="10" fill="#e6edf3">git switch -c</text>
  <text x="28" y="130" font-family="monospace" font-size="10" fill="#8b949e">feature/name</text>
  <text x="28" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Branch from main</text>
  <text x="28" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Use clear names</text>
  <text x="28" y="178" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">feat/ fix/ chore/</text>
  <!-- Arrow -->
  <polygon points="144,133 156,128 144,123" fill="#30363d"/>
  <line x1="144" y1="133" x2="156" y2="133" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="158" y="68" width="126" height="130" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="158" y="68" width="126" height="32" rx="8" fill="#1f4280" fill-opacity="0.5"/>
  <text x="221" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#58a6ff">2. Commit</text>
  <use href="#git-logo" x="164" y="70" width="20" height="20"/>
  <text x="168" y="116" font-family="monospace" font-size="10" fill="#e6edf3">git add .</text>
  <text x="168" y="130" font-family="monospace" font-size="10" fill="#8b949e">git commit -m</text>
  <text x="168" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Small, focused</text>
  <text x="168" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Conventional msgs</text>
  <text x="168" y="176" font-family="monospace" font-size="10" fill="#8b949e">feat: add login</text>
  <polygon points="284,133 296,128 284,123" fill="#30363d"/>
  <line x1="284" y1="133" x2="296" y2="133" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="298" y="68" width="126" height="130" rx="8" fill="#161b22" stroke="#2496ED" stroke-width="1.5"/>
  <rect x="298" y="68" width="126" height="32" rx="8" fill="#0d3d66" fill-opacity="0.5"/>
  <text x="361" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#2496ED">3. Push</text>
  <use href="#gh-logo" x="304" y="70" width="20" height="20"/>
  <text x="308" y="116" font-family="monospace" font-size="10" fill="#e6edf3">git push origin</text>
  <text x="308" y="130" font-family="monospace" font-size="10" fill="#8b949e">feature/name</text>
  <text x="308" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Publish branch</text>
  <text x="308" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">to GitHub</text>
  <text x="308" y="176" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Triggers CI</text>
  <polygon points="424,133 436,128 424,123" fill="#30363d"/>
  <line x1="424" y1="133" x2="436" y2="133" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="438" y="68" width="126" height="130" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <rect x="438" y="68" width="126" height="32" rx="8" fill="#3d1d7a" fill-opacity="0.4"/>
  <text x="501" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#a371f7">4. Pull Request</text>
  <use href="#gh-logo" x="444" y="70" width="20" height="20"/>
  <text x="448" y="116" font-family="monospace" font-size="10" fill="#e6edf3">gh pr create</text>
  <text x="448" y="130" font-family="monospace" font-size="10" fill="#8b949e">--fill</text>
  <text x="448" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Describe changes</text>
  <text x="448" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Request review</text>
  <text x="448" y="176" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">CI must pass ✅</text>
  <polygon points="564,133 576,128 564,123" fill="#30363d"/>
  <line x1="564" y1="133" x2="576" y2="133" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="578" y="68" width="126" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <rect x="578" y="68" width="126" height="32" rx="8" fill="#4a3500" fill-opacity="0.5"/>
  <text x="641" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#d29922">5. Review</text>
  <use href="#gh-logo" x="584" y="70" width="20" height="20"/>
  <text x="588" y="116" font-family="monospace" font-size="10" fill="#e6edf3">gh pr review</text>
  <text x="588" y="130" font-family="monospace" font-size="10" fill="#8b949e">--approve</text>
  <text x="588" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Inline comments</text>
  <text x="588" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Request changes</text>
  <text x="588" y="176" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Approve → merge</text>
  <polygon points="704,133 716,128 704,123" fill="#30363d"/>
  <line x1="704" y1="133" x2="716" y2="133" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 6 -->
  <rect x="718" y="68" width="124" height="130" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="718" y="68" width="124" height="32" rx="8" fill="#238636" fill-opacity="0.4"/>
  <text x="780" y="88" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3fb950">6. Merge+Deploy</text>
  <use href="#gh-logo" x="724" y="70" width="20" height="20"/>
  <text x="728" y="116" font-family="monospace" font-size="10" fill="#e6edf3">gh pr merge</text>
  <text x="728" y="130" font-family="monospace" font-size="10" fill="#8b949e">--squash</text>
  <text x="728" y="148" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Merge to main</text>
  <text x="728" y="162" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Auto-deploy</text>
  <text x="728" y="176" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Delete branch</text>

  <!-- Curved return arrow bottom -->
  <path d="M780 200 Q430 250 81 200" stroke="#3fb950" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="81,195 70,200 81,205" fill="#3fb950"/>
  <text x="430" y="242" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#3fb950">next feature → branch again from updated main</text>

  <text x="430" y="296" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">GitHub Flow: simple, linear, production-always-deployable workflow — ideal for web apps and SaaS</text>
</svg>
