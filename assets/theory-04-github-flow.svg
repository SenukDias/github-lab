<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/><stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <clipPath id="card"><rect width="860" height="400" rx="14"/></clipPath>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#58a6ff" opacity="0.8"/>
    </marker>
  </defs>
  <g clip-path="url(#card)">
    <rect width="860" height="400" fill="url(#bg)"/>
    <rect width="860" height="56" fill="url(#hdr)"/>
    <circle cx="24" cy="28" r="5.5" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="40" cy="28" r="5.5" fill="#ffd93d" opacity="0.9"/>
    <circle cx="56" cy="28" r="5.5" fill="#6bcb77" opacity="0.9"/>
    <text x="430" y="34" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#e6edf3">📖  Theory 04 — GitHub Flow</text>
    <line x1="0" y1="56" x2="860" y2="56" stroke="#30363d" stroke-width="1"/>

    <!-- Subtitle -->
    <text x="430" y="86" font-family="system-ui,sans-serif" font-size="12.5" text-anchor="middle" fill="#8b949e">A lightweight, branch-based workflow for continuous delivery</text>

    <!-- Step sizing: 6 steps across 860px. Step width ~124px -->
    <!-- Steps at y=110 to y=280, center line at y=175 -->

    <!-- Connector line -->
    <line x1="84" y1="175" x2="776" y2="175" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

    <!-- Step data: x, color, num, icon, title, desc1, desc2 -->

    <!-- STEP 1 — Create Branch -->
    <circle cx="84" cy="175" r="32" fill="#1a3020" stroke="#3fb950" stroke-width="2"/>
    <text x="84" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">🌿</text>
    <text x="84" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3fb950">1</text>
    <text x="84" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Create</text>
    <text x="84" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Branch</text>
    <text x="84" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">git switch -c</text>
    <text x="84" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">feature/name</text>

    <!-- Arrow 1→2 -->
    <line x1="122" y1="175" x2="190" y2="175" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#ah)" opacity="0.7"/>

    <!-- STEP 2 — Add Commits -->
    <circle cx="222" cy="175" r="32" fill="#1a2030" stroke="#58a6ff" stroke-width="2"/>
    <text x="222" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">💾</text>
    <text x="222" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#58a6ff">2</text>
    <text x="222" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Add</text>
    <text x="222" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Commits</text>
    <text x="222" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">git add .</text>
    <text x="222" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">git commit</text>

    <!-- Arrow 2→3 -->
    <line x1="260" y1="175" x2="328" y2="175" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#ah)" opacity="0.7"/>

    <!-- STEP 3 — Open PR -->
    <circle cx="360" cy="175" r="32" fill="#1a1a30" stroke="#a78bfa" stroke-width="2"/>
    <text x="360" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">📬</text>
    <text x="360" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#a78bfa">3</text>
    <text x="360" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Open Pull</text>
    <text x="360" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Request</text>
    <text x="360" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">git push</text>
    <text x="360" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">gh pr create</text>

    <!-- Arrow 3→4 -->
    <line x1="398" y1="175" x2="466" y2="175" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#ah)" opacity="0.7"/>

    <!-- STEP 4 — Discuss & Review -->
    <circle cx="498" cy="175" r="32" fill="#201a10" stroke="#d29922" stroke-width="2"/>
    <text x="498" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">💬</text>
    <text x="498" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#d29922">4</text>
    <text x="498" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Review &amp;</text>
    <text x="498" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Discuss</text>
    <text x="498" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">gh pr review</text>
    <text x="498" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">gh pr comment</text>

    <!-- Arrow 4→5 -->
    <line x1="536" y1="175" x2="604" y2="175" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#ah)" opacity="0.7"/>

    <!-- STEP 5 — Deploy & Test -->
    <circle cx="636" cy="175" r="32" fill="#1a1420" stroke="#f472b6" stroke-width="2"/>
    <text x="636" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">🚀</text>
    <text x="636" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#f472b6">5</text>
    <text x="636" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Deploy</text>
    <text x="636" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">&amp; Test</text>
    <text x="636" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">CI/CD runs</text>
    <text x="636" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">gh run watch</text>

    <!-- Arrow 5→6 -->
    <line x1="674" y1="175" x2="740" y2="175" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#ah)" opacity="0.7"/>

    <!-- STEP 6 — Merge -->
    <circle cx="776" cy="175" r="32" fill="#1a3020" stroke="#3fb950" stroke-width="2.5"/>
    <text x="776" y="168" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle" fill="#e6edf3">✅</text>
    <text x="776" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3fb950">6</text>
    <text x="776" y="224" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Merge to</text>
    <text x="776" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e6edf3">Main</text>
    <text x="776" y="258" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">gh pr merge</text>
    <text x="776" y="272" font-family="'Courier New',monospace" font-size="9.5" text-anchor="middle" fill="#6e7681">--squash</text>

    <!-- Tip labels above circles -->
    <text x="84" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">from main</text>
    <text x="222" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">small &amp; often</text>
    <text x="360" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">describe changes</text>
    <text x="498" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">team feedback</text>
    <text x="636" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">staging env</text>
    <text x="776" y="134" font-family="system-ui,sans-serif" font-size="9.5" text-anchor="middle" fill="#6e7681">delete branch</text>

    <!-- Footer tip -->
    <rect y="310" width="860" height="90" fill="#10180d"/>
    <line x1="0" y1="310" x2="860" y2="310" stroke="#3fb950" stroke-width="1.5" opacity="0.35"/>
    <text x="430" y="338" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#7ee787">💡  GitHub Flow Key Rules</text>
    <text x="215" y="360" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle" fill="#8b949e">✦  main is always deployable</text>
    <text x="215" y="378" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle" fill="#8b949e">✦  branches are short-lived</text>
    <text x="645" y="360" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle" fill="#8b949e">✦  every change goes through a PR</text>
    <text x="645" y="378" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle" fill="#8b949e">✦  CI must pass before merging</text>
  </g>
  <rect width="860" height="400" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
